<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 9 Countdown Slideshow</title>
    <link rel="stylesheet" href="CSS/main.css">
</head>

<body>

    <h1>Project 9 Countdown Slideshow Assignment</h1>

    <!-- Countdown section -->
    <h2>Countdown Timer</h2>
    <p>How many seconds would you like to set your alarm for?</p>
    <input id="seconds" value="">
    <button onclick="countdown()">Click here</button>
    <p id="timer"></p>

    <hr>

    <!-- Slideshow container -->
    <div class="slideshow-container">

        <!-- Full-width images with number and caption text -->
        <div class="mySlides fade">
            <div class="numbertext">1 / 4</div>
            <img src="IMAGES/img_lights_wide.jpg" style="width:100%">
            <div class="text">Lights</div>
        </div>

        <div class="mySlides fade">
            <div class="numbertext">2 / 4</div>
            <img src="IMAGES/img_mountains_wide.jpg" style="width:100%">
            <div class="text">Mountains</div>
        </div>

        <div class="mySlides fade">
            <div class="numbertext">3 / 4</div>
            <img src="IMAGES/img_nature_wide.jpg" style="width:100%">
            <div class="text">Nature</div>
        </div>

        <div class="mySlides fade">
            <div class="numbertext">4 / 4</div>
            <img src="IMAGES/img_snow_wide.jpg" style="width:100%">
            <div class="text">Snow</div>
        </div>

        <!-- Next and previous buttons -->
        <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>

    <br>

    <!-- The dots/circles -->
    <div style="text-align:center">
        <span class="dot" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
        <span class="dot" onclick="currentSlide(3)"></span>
        <span class="dot" onclick="currentSlide(4)"></span>
    </div>

    <script src="JS/main.js"></script>
</body>

</html>
